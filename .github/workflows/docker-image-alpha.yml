name: Publish Docker image (alpha)

on:
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare alpha version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

  frontend:
    name: Build Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        app: [default, classic]
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rsbuild output
        uses: actions/cache@v5
        with:
          path: web/${{ matrix.app }}/node_modules/.cache
          key: ${{ runner.os }}-rsbuild-${{ matrix.app }}-${{ hashFiles('web/bun.lock', 'web/package.json', 'web/default/package.json', 'web/classic/package.json', 'web/default/rsbuild.config.ts', 'web/classic/rsbuild.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-rsbuild-${{ matrix.app }}-

      - name: Build Frontend
        env:
          CI: ""
          DISABLE_ESLINT_PLUGIN: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd web
          bun install --filter ./${{ matrix.app }} --frozen-lockfile
          cd ${{ matrix.app }}
          VITE_REACT_APP_VERSION=$VERSION bun run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ matrix.app }}
          path: web/${{ matrix.app }}/dist
          if-no-files-found: error
          retention-days: 1

  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Write VERSION
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "$VERSION" > VERSION
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Download Default Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-default
          path: web/default/dist

      - name: Download Classic Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-classic
          path: web/classic/dist

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=new-api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=new-api-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image with cosign
        run: |
          cosign sign --yes ghcr.io/${{ env.GHCR_REPOSITORY }}@${{ steps.build.outputs.digest }}

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests (GHCR)
    needs: [prepare, build_single_arch]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:alpha \
            ghcr.io/${GHCR_REPOSITORY}:alpha-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:alpha-arm64

      - name: Create & push manifest (GHCR - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${VERSION} \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:alpha >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
