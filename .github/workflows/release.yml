name: Release (Linux, macOS, Windows)
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
  push:
    tags:
      - '*'
      - '!*-alpha*'

jobs:
  prepare_web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        run: |
          VERSION=$(git describe --tags)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Build Frontend Assets
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="$VERSION" bun run build
          cd ../classic
          VITE_REACT_APP_VERSION="$VERSION" bun run build
          cd ../..
          tar -cf web-dist.tar web/default/dist web/classic/dist

      - name: Upload Web Assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar
          retention-days: 1

  linux:
    name: Linux Release
    needs: prepare_web
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare_web.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Web Assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .

      - name: Unpack Web Assets
        run: tar -xf web-dist.tar

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
          cache-dependency-path: go.sum

      - name: Build Backend (amd64)
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o "new-api-$VERSION"

      - name: Build Backend (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o "new-api-arm64-$VERSION"

      - name: Generate checksums
        run: sha256sum new-api-* > checksums-linux.txt

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            new-api-*
            checksums-linux.txt
          retention-days: 7

  macos:
    name: macOS Release
    needs: prepare_web
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare_web.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Web Assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .

      - name: Unpack Web Assets
        run: tar -xf web-dist.tar

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
          cache-dependency-path: go.sum

      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o "new-api-macos-$VERSION"

      - name: Generate checksums
        run: shasum -a 256 new-api-macos-* > checksums-macos.txt

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            new-api-macos-*
            checksums-macos.txt
          retention-days: 7

  windows:
    name: Windows Release
    needs: prepare_web
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      VERSION: ${{ needs.prepare_web.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Web Assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .

      - name: Unpack Web Assets
        run: tar -xf web-dist.tar

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
          cache-dependency-path: go.sum

      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o "new-api-$VERSION.exe"

      - name: Generate checksums
        run: sha256sum new-api-*.exe > checksums-windows.txt

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            new-api-*.exe
            checksums-windows.txt
          retention-days: 7

  publish_release:
    name: Publish Release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release'
          path: release-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
