name: Release (Linux, macOS, Windows)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
  push:
    tags:
      - '*'
      - '!*-alpha*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        run: |
          VERSION=$(git describe --tags)
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/default/bun.lock', 'web/classic/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build Frontend (default)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd web/default
          bun install --frozen-lockfile
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build

      - name: Build Frontend (classic)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd web/classic
          bun install --frozen-lockfile
          VITE_REACT_APP_VERSION=$VERSION bun run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: |
            web/default/dist
            web/classic/dist
          if-no-files-found: error
          retention-days: 1

  linux:
    name: Linux Release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            output: new-api
          - arch: arm64
            runner: ubuntu-24.04-arm
            output: new-api-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.1'
          cache: true
          cache-dependency-path: go.sum

      - name: Build Backend
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION' -extldflags '-static'" -o ${{ matrix.output }}-$VERSION

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: ${{ matrix.output }}-${{ needs.prepare.outputs.version }}
          if-no-files-found: error
          retention-days: 1

  macos:
    name: macOS Release
    runs-on: macos-latest
    needs: [prepare, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.1'
          cache: true
          cache-dependency-path: go.sum

      - name: Build Backend
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          go build -ldflags "-X 'new-api/common.Version=$VERSION'" -o new-api-macos-$VERSION

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: new-api-macos-${{ needs.prepare.outputs.version }}
          if-no-files-found: error
          retention-days: 1

  windows:
    name: Windows Release
    runs-on: windows-latest
    needs: [prepare, frontend]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.1'
          cache: true
          cache-dependency-path: go.sum

      - name: Build Backend
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION'" -o new-api-$VERSION.exe

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: new-api-${{ needs.prepare.outputs.version }}.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd dist
          sha256sum new-api-$VERSION new-api-arm64-$VERSION > checksums-linux.txt
          sha256sum new-api-macos-$VERSION > checksums-macos.txt
          sha256sum new-api-$VERSION.exe > checksums-windows.txt

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --verify-tag --title "$VERSION" --notes "" || \
              gh release view "$VERSION" >/dev/null
          fi
          gh release upload "$VERSION" dist/new-api-* dist/checksums-*.txt --clobber
