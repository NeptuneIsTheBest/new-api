name: Build Electron App

on:
  push:
    tags:
      - '*'  # Triggers on version tags like v1.0.0
      - '!*-*'  # Ignore pre-release tags like v1.0.0-beta
      - '!*-alpha*' # Ignore alpha tags like v1.0.0-alpha
  workflow_dispatch:  # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Electron version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags)
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  frontend:
    name: Build Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        app: [default, classic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rsbuild output
        uses: actions/cache@v5
        with:
          path: web/${{ matrix.app }}/node_modules/.cache
          key: ${{ runner.os }}-rsbuild-${{ matrix.app }}-${{ hashFiles('web/bun.lock', 'web/package.json', 'web/default/package.json', 'web/classic/package.json', 'web/default/rsbuild.config.ts', 'web/classic/rsbuild.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-rsbuild-${{ matrix.app }}-

      - name: Build frontend
        env:
          CI: ""
          DISABLE_ESLINT_PLUGIN: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd web
          bun install --filter ./${{ matrix.app }} --frozen-lockfile
          cd ${{ matrix.app }}
          VITE_REACT_APP_VERSION=$VERSION bun run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ matrix.app }}
          path: web/${{ matrix.app }}/dist
          if-no-files-found: error
          retention-days: 1

  build:
    needs: [prepare, frontend]
    strategy:
      matrix:
        # os: [macos-latest, windows-latest]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      VERSION: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.1'
          cache: true
          cache-dependency-path: go.sum

      - name: Download Default Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-default
          path: web/default/dist

      - name: Download Classic Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-classic
          path: web/classic/dist

      # - name: Build Go binary (macos/Linux)
      #   if: runner.os != 'Windows'
      #   run: |
      #     go mod download
      #     go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api

      - name: Build Go binary (Windows)
        if: runner.os == 'Windows'
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o new-api.exe

      - name: Update Electron version
        run: |
          cd electron
          ELECTRON_VERSION=${VERSION#v}  # Remove 'v' prefix if present
          # Convert to valid semver: take first 3 components and convert rest to prerelease format
          # e.g., 0.9.3-patch.1 -> 0.9.3-patch.1
          if [[ $ELECTRON_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            REST=${BASH_REMATCH[4]}
          
            ELECTRON_VERSION="$MAJOR.$MINOR.$PATCH"
          
            # If there's extra content, append it without adding -dev
            if [[ -n "$REST" ]]; then
              ELECTRON_VERSION="$ELECTRON_VERSION$REST"
            fi
          fi
          npm version $ELECTRON_VERSION --no-git-tag-version --allow-same-version

      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      # - name: Build Electron app (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     cd electron
      #     npm run build:mac
      #   env:
      #     CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: |
          cd electron
          npm run build:win

      # - name: Upload artifacts (macOS)
      #   if: runner.os == 'macOS'
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: macos-build
      #     path: |
      #       electron/dist/*.dmg
      #       electron/dist/*.zip

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            electron/dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: windows-build

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --verify-tag --title "$VERSION" --notes "" || \
              gh release view "$VERSION" >/dev/null
          fi
          gh release upload "$VERSION" windows-build/* --clobber
