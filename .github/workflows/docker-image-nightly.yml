name: Publish Docker image (nightly)

on:
  push:
    branches:
      - nightly
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare nightly version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine nightly version
        id: version
        run: |
          VERSION="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

  frontend:
    name: Build Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        app: [default, classic]
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rsbuild output
        uses: actions/cache@v5
        with:
          path: web/${{ matrix.app }}/node_modules/.cache
          key: ${{ runner.os }}-rsbuild-${{ matrix.app }}-${{ hashFiles('web/bun.lock', 'web/package.json', 'web/default/package.json', 'web/classic/package.json', 'web/default/rsbuild.config.ts', 'web/classic/rsbuild.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-rsbuild-${{ matrix.app }}-

      - name: Build Frontend
        env:
          CI: ""
          DISABLE_ESLINT_PLUGIN: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd web
          bun install --filter ./${{ matrix.app }} --frozen-lockfile
          cd ${{ matrix.app }}
          VITE_REACT_APP_VERSION=$VERSION bun run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ matrix.app }}
          path: web/${{ matrix.app }}/dist
          if-no-files-found: error
          retention-days: 1

  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Write VERSION
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "$VERSION" > VERSION
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Download Default Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-default
          path: web/default/dist

      - name: Download Classic Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist-classic
          path: web/classic/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            calciumion/new-api

      - name: Build & push single-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            calciumion/new-api:nightly-${{ matrix.arch }}
            calciumion/new-api:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=new-api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=new-api-${{ matrix.arch }}
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (Docker Hub)
    needs: [prepare, build_single_arch]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - nightly)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:nightly \
            calciumion/new-api:nightly-amd64 \
            calciumion/new-api:nightly-arm64

      - name: Create & push manifest (Docker Hub - versioned nightly)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:${VERSION} \
            calciumion/new-api:${VERSION}-amd64 \
            calciumion/new-api:${VERSION}-arm64
