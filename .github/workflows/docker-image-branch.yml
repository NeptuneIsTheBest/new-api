name: Publish Docker image (manual branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to build (e.g. alpha, nightly)"
        required: true
        type: string

jobs:
  prepare:
    name: Prepare Docker tags
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.version.outputs.branch }}
      sha: ${{ steps.version.outputs.sha }}
      tag_prefix: ${{ steps.version.outputs.tag_prefix }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ inputs.branch }}

      - name: Resolve Docker tags
        id: version
        env:
          BRANCH_NAME: ${{ inputs.branch }}
        run: |
          TAG_PREFIX=$(printf '%s' "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')
          TAG_PREFIX=${TAG_PREFIX:0:105}
          TAG_PREFIX=$(printf '%s' "$TAG_PREFIX" | sed -E 's/[.-]+$//')
          if [ -z "$TAG_PREFIX" ]; then
            echo "::error::Branch '$BRANCH_NAME' cannot be converted to a valid Docker tag prefix"
            exit 1
          fi

          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${TAG_PREFIX}-$(date +'%Y%m%d')-${SHORT_SHA}"

          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag_prefix=$TAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Prepared Docker tags for $BRANCH_NAME at $SHORT_SHA"

  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Write VERSION
        run: |
          echo "${{ needs.prepare.outputs.version }}" > VERSION
          echo "Publishing version: ${{ needs.prepare.outputs.version }} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image name
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/new-api"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}
            ${{ steps.image.outputs.image }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=new-api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=new-api-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image with cosign
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${IMAGE}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests (GHCR)
    needs: [prepare, build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/new-api" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - branch)
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}" \
            "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}-amd64" \
            "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}-arm64"

      - name: Create & push manifest (GHCR - versioned)
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.prepare.outputs.version }}" \
            "${IMAGE}:${{ needs.prepare.outputs.version }}-amd64" \
            "${IMAGE}:${{ needs.prepare.outputs.version }}-arm64"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign manifests with cosign
        run: |
          cosign sign --yes "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}"
          cosign sign --yes "${IMAGE}:${{ needs.prepare.outputs.version }}"

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect "${IMAGE}:${{ needs.prepare.outputs.tag_prefix }}" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect "${IMAGE}:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
